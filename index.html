<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Python Trainer 🐍</title>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e2e8f0; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1e1b4b, #312e81); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #3730a3; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .snake { font-size: 2rem; }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.88rem; color: #a5b4fc; margin-top: 3px; }
    .lang-toggle { display: flex; background: #13132a; border: 1px solid #3730a3; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
    .lang-btn { padding: 7px 14px; font-size: 0.82rem; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #64748b; transition: all 0.2s; }
    .lang-btn.active { background: #4f46e5; color: white; }
    .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 88px); }
    .sidebar { background: #13131f; border-right: 1px solid #1e1b4b; overflow-y: auto; padding: 16px 0; }
    .sidebar-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #6366f1; padding: 0 16px 12px; }
    .exercise-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .exercise-item:hover { background: #1a1a2e; border-left-color: #4f46e5; }
    .exercise-item.active { background: #1e1b4b; border-left-color: #6366f1; }
    .ex-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; background: #1e1b4b; color: #6366f1; border: 1px solid #3730a3; }
    .exercise-item.done .ex-icon { background: #166534; color: #86efac; border-color: #166534; }
    .exercise-item.active .ex-icon { background: #4f46e5; color: white; border-color: #6366f1; }
    .ex-info { flex: 1; min-width: 0; }
    .ex-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ex-level { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
    .level-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 999px; font-weight: 600; }
    .badge-debutant { background: #1e3a5f; color: #60a5fa; }
    .badge-intermediaire { background: #3b1f5e; color: #c084fc; }
    .badge-avance { background: #5e1f1f; color: #f87171; }
    .main { display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; }
    .exercise-header { padding: 20px 28px; background: #13131f; border-bottom: 1px solid #1e1b4b; }
    .exercise-header h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .exercise-header p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }
    .hint-box { margin-top: 12px; padding: 10px 14px; background: #1e1b4b; border-left: 3px solid #6366f1; border-radius: 4px; font-size: 0.82rem; color: #a5b4fc; display: none; }
    .editor-zone { display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
    .editor-panel, .output-panel { display: flex; flex-direction: column; overflow: hidden; }
    .panel-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; padding: 8px 16px; background: #0d0d1a; border-bottom: 1px solid #1e1b4b; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-blue { background: #6366f1; } .dot-green { background: #22c55e; }
    textarea#code-editor { flex: 1; background: #0a0a16; color: #e2e8f0; border: none; padding: 16px; font-family: 'Fira Code', 'Courier New', monospace; font-size: 0.9rem; line-height: 1.7; resize: none; outline: none; border-right: 1px solid #1e1b4b; tab-size: 4; }
    #output { flex: 1; padding: 16px; font-family: 'Fira Code', 'Courier New', monospace; font-size: 0.88rem; line-height: 1.7; overflow-y: auto; white-space: pre-wrap; color: #94a3b8; }
    #output.success { color: #86efac; } #output.error { color: #f87171; }
    .expected-box { padding: 10px 16px; background: #0d1f1a; border-top: 1px solid #166534; font-size: 0.78rem; color: #4ade80; font-family: monospace; }
    .expected-box span { color: #166534; font-weight: 700; margin-right: 6px; }
    .toolbar { padding: 12px 28px; background: #0d0d1a; border-top: 1px solid #1e1b4b; display: flex; align-items: center; gap: 12px; }
    button { padding: 9px 20px; border-radius: 8px; border: none; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    #btn-run { background: #4f46e5; color: white; } #btn-run:hover { background: #6366f1; }
    #btn-check { background: #166534; color: #86efac; } #btn-check:hover { background: #15803d; }
    #btn-hint { background: transparent; color: #6366f1; border: 1px solid #3730a3; } #btn-hint:hover { background: #1e1b4b; }
    #btn-reset { background: transparent; color: #475569; border: 1px solid #1e293b; margin-left: auto; } #btn-reset:hover { color: #94a3b8; }
    .status-msg { font-size: 0.85rem; font-weight: 600; padding: 6px 14px; border-radius: 6px; display: none; }
    .status-msg.ok { background: #166534; color: #86efac; display: inline-block; }
    .status-msg.fail { background: #7f1d1d; color: #f87171; display: inline-block; }
    .progress-bar { height: 3px; background: #1e1b4b; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); transition: width 0.4s ease; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f0f1a; } ::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 3px; }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="snake">🐍</div>
    <div><h1>Python Trainer</h1><p data-i18n="subtitle">Progresse étape par étape en codant directement dans le navigateur</p></div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button>
    <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
  </div>
</header>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="exercise-header">
      <h2 id="ex-title"></h2>
      <p id="ex-description"></p>
      <div class="hint-box" id="hint-box"></div>
    </div>
    <div class="editor-zone">
      <div class="editor-panel">
        <div class="panel-label"><span class="dot dot-blue"></span><span data-i18n="your-code">Ton code</span></div>
        <textarea id="code-editor" spellcheck="false"></textarea>
      </div>
      <div class="output-panel">
        <div class="panel-label"><span class="dot dot-green"></span><span data-i18n="result">Résultat</span></div>
        <div id="output"></div>
        <div class="expected-box"><span data-i18n="expected">Attendu :</span><span id="expected-display"></span></div>
      </div>
    </div>
    <div class="toolbar">
      <button id="btn-run" data-i18n="run">▶ Exécuter</button>
      <button id="btn-check" data-i18n="validate">✓ Valider</button>
      <button id="btn-hint" data-i18n="hint">💡 Indice</button>
      <span class="status-msg" id="status-msg"></span>
      <button id="btn-reset" data-i18n="reset">↺ Réinitialiser</button>
    </div>
  </div>
</div>

<script>
const UI = {
  fr: {
    subtitle: 'Progresse étape par étape en codant directement dans le navigateur',
    'your-code': 'Ton code', result: 'Résultat', expected: 'Attendu :',
    run: '▶ Exécuter', validate: '✓ Valider', hint: '💡 Indice', reset: '↺ Réinitialiser',
    exercises: 'Exercices', ok: '🎉 Bravo, exercice validé !', fail: '✗ Pas encore correct, réessaie !',
    err: '✗ Erreur dans le code', waiting: '▶ Clique sur "Exécuter" pour lancer ton code...',
    levels: { debutant: 'Débutant', intermediaire: 'Intermédiaire', avance: 'Avancé' }
  },
  en: {
    subtitle: 'Practice step by step by coding directly in your browser',
    'your-code': 'Your code', result: 'Output', expected: 'Expected:',
    run: '▶ Run', validate: '✓ Validate', hint: '💡 Hint', reset: '↺ Reset',
    exercises: 'Exercises', ok: '🎉 Well done, exercise completed!', fail: '✗ Not quite right, try again!',
    err: '✗ Error in the code', waiting: '▶ Click "Run" to execute your code...',
    levels: { debutant: 'Beginner', intermediaire: 'Intermediate', avance: 'Advanced' }
  }
};

const exercises = [
  {
    id:1, level:'debutant',
    name:'Somme d\'une liste', name_en:'Sum of a list',
    description:'Crée une fonction `somme(liste)` qui retourne la somme de tous les éléments d\'une liste.\n\nEx : somme([1, 2, 3, 4]) → 10',
    description_en:'Create a `somme(liste)` function that returns the sum of all elements in a list.\n\nEx: somme([1, 2, 3, 4]) → 10',
    hint:'Tu peux utiliser une boucle for, ou directement la fonction intégrée sum() de Python.',
    hint_en:'You can use a for loop, or Python\'s built-in sum() function.',
    starter:`def somme(liste):\n    # Ton code ici\n    pass\n\n# Test\nprint(somme([1, 2, 3, 4]))\nprint(somme([10, 20, 30]))`,
    expected:'10\n60', check:(o)=>o.trim()==='10\n60'
  },
  {
    id:2, level:'debutant',
    name:'Nombre pair ou impair', name_en:'Even or odd',
    description:'Crée une fonction `parite(n)` qui retourne `"pair"` si n est pair, `"impair"` sinon.\n\nEx : parite(4) → pair | parite(7) → impair',
    description_en:'Create a `parite(n)` function that returns `"pair"` if n is even, `"impair"` otherwise.\n\nEx: parite(4) → pair | parite(7) → impair',
    hint:'Utilise l\'opérateur modulo % pour tester si un nombre est divisible par 2.',
    hint_en:'Use the modulo operator % to check if a number is divisible by 2.',
    starter:`def parite(n):\n    # Ton code ici\n    pass\n\nprint(parite(4))\nprint(parite(7))\nprint(parite(0))`,
    expected:'pair\nimpair\npair', check:(o)=>o.trim()==='pair\nimpair\npair'
  },
  {
    id:3, level:'debutant',
    name:'Inverser une chaîne', name_en:'Reverse a string',
    description:'Crée une fonction `inverser(texte)` qui retourne la chaîne à l\'envers.\n\nEx : inverser("bonjour") → ruojnob',
    description_en:'Create an `inverser(texte)` function that returns the string reversed.\n\nEx: inverser("bonjour") → ruojnob',
    hint:'En Python, tu peux inverser une chaîne avec le slicing : texte[::-1]',
    hint_en:'In Python, you can reverse a string using slicing: texte[::-1]',
    starter:`def inverser(texte):\n    # Ton code ici\n    pass\n\nprint(inverser("bonjour"))\nprint(inverser("Python"))`,
    expected:'ruojnob\nnohtyP', check:(o)=>o.trim()==='ruojnob\nnohtyP'
  },
  {
    id:4, level:'intermediaire',
    name:'Filtrer une liste', name_en:'Filter a list',
    description:'Crée une fonction `filtrer_pairs(liste)` qui retourne uniquement les nombres pairs.\n\nEx : filtrer_pairs([1, 2, 3, 4, 5, 6]) → [2, 4, 6]',
    description_en:'Create a `filtrer_pairs(liste)` function that returns only even numbers.\n\nEx: filtrer_pairs([1, 2, 3, 4, 5, 6]) → [2, 4, 6]',
    hint:'Utilise une list comprehension : [x for x in liste if condition]',
    hint_en:'Use a list comprehension: [x for x in liste if condition]',
    starter:`def filtrer_pairs(liste):\n    # Ton code ici\n    pass\n\nprint(filtrer_pairs([1, 2, 3, 4, 5, 6]))\nprint(filtrer_pairs([10, 11, 12, 13]))`,
    expected:'[2, 4, 6]\n[10, 12]', check:(o)=>o.trim()==='[2, 4, 6]\n[10, 12]'
  },
  {
    id:5, level:'intermediaire',
    name:'Compter les occurrences', name_en:'Count occurrences',
    description:'Crée une fonction `compter_mots(texte)` qui retourne un dictionnaire avec chaque mot et son nombre d\'occurrences.\n\nEx : compter_mots("je mange et je dors") → {\'je\': 2, \'mange\': 1, \'et\': 1, \'dors\': 1}',
    description_en:'Create a `compter_mots(texte)` function that returns a dictionary with each word and its occurrence count.\n\nEx: compter_mots("je mange et je dors") → {\'je\': 2, \'mange\': 1, \'et\': 1, \'dors\': 1}',
    hint:'Utilise un dictionnaire. Pour chaque mot, vérifie s\'il est déjà dans le dict avec `if mot in dict`.',
    hint_en:'Use a dictionary. For each word, check if it\'s already in the dict with `if word in dict`.',
    starter:`def compter_mots(texte):\n    mots = texte.split()\n    resultat = {}\n    # Ton code ici\n    return resultat\n\nprint(compter_mots("je mange et je dors"))`,
    expected:"{'je': 2, 'mange': 1, 'et': 1, 'dors': 1}", check:(o)=>o.trim()==="{'je': 2, 'mange': 1, 'et': 1, 'dors': 1}"
  },
  {
    id:6, level:'intermediaire',
    name:'FizzBuzz', name_en:'FizzBuzz',
    description:'Affiche les nombres de 1 à 20.\n• Si divisible par 3 → affiche `Fizz`\n• Si divisible par 5 → affiche `Buzz`\n• Si divisible par 3 ET 5 → affiche `FizzBuzz`\n• Sinon → affiche le nombre',
    description_en:'Print numbers from 1 to 20.\n• If divisible by 3 → print `Fizz`\n• If divisible by 5 → print `Buzz`\n• If divisible by both 3 AND 5 → print `FizzBuzz`\n• Otherwise → print the number',
    hint:'Attention à l\'ordre des conditions : teste FizzBuzz EN PREMIER avant Fizz et Buzz séparément.',
    hint_en:'Watch the order: test FizzBuzz FIRST, before testing Fizz and Buzz separately.',
    starter:`for i in range(1, 21):\n    # Ton code ici\n    pass`,
    expected:'1\n2\nFizz\n4\nBuzz\nFizz\n7\n8\nFizz\nBuzz\n11\nFizz\n13\n14\nFizzBuzz\n16\n17\nFizz\n19\nBuzz',
    check:(o)=>o.trim()==='1\n2\nFizz\n4\nBuzz\nFizz\n7\n8\nFizz\nBuzz\n11\nFizz\n13\n14\nFizzBuzz\n16\n17\nFizz\n19\nBuzz'
  },
  {
    id:7, level:'avance',
    name:'Classe Compte Bancaire', name_en:'Bank Account Class',
    description:'Crée une classe `CompteBancaire` avec :\n• Un attribut `solde` (initialisé à 0)\n• Une méthode `deposer(montant)`\n• Une méthode `retirer(montant)` (si solde suffisant)\n• Une méthode `afficher()` qui affiche `Solde : X€`',
    description_en:'Create a `CompteBancaire` class with:\n• A `solde` attribute (initialized to 0)\n• A `deposer(montant)` method\n• A `retirer(montant)` method (only if balance is sufficient)\n• An `afficher()` method that prints `Solde : X€`',
    hint:'Dans __init__, initialise self.solde = 0. Dans retirer(), vérifie d\'abord que montant <= self.solde.',
    hint_en:'In __init__, set self.solde = 0. In retirer(), first check that montant <= self.solde.',
    starter:`class CompteBancaire:\n    def __init__(self):\n        pass\n\n    def deposer(self, montant):\n        pass\n\n    def retirer(self, montant):\n        pass\n\n    def afficher(self):\n        pass\n\ncompte = CompteBancaire()\ncompte.deposer(500)\ncompte.retirer(200)\ncompte.afficher()`,
    expected:'Solde : 300€', check:(o)=>o.trim()==='Solde : 300€'
  },
  {
    id:8, level:'avance',
    name:'Récursivité : Fibonacci', name_en:'Recursion: Fibonacci',
    description:'Crée une fonction récursive `fibonacci(n)` qui retourne le n-ième terme.\n\nFibonacci : 0, 1, 1, 2, 3, 5, 8, 13...',
    description_en:'Create a recursive `fibonacci(n)` function that returns the nth term.\n\nFibonacci: 0, 1, 1, 2, 3, 5, 8, 13...',
    hint:'Une fonction récursive s\'appelle elle-même. N\'oublie pas le cas de base : if n <= 1: return n',
    hint_en:'A recursive function calls itself. Don\'t forget the base case: if n <= 1: return n',
    starter:`def fibonacci(n):\n    # Ton code ici\n    pass\n\nfor i in range(8):\n    print(fibonacci(i))`,
    expected:'0\n1\n1\n2\n3\n5\n8\n13', check:(o)=>o.trim()==='0\n1\n1\n2\n3\n5\n8\n13'
  }
];

let lang = localStorage.getItem('lang') || 'fr';
let current = 0;
let done = new Set(JSON.parse(localStorage.getItem('py_done') || '[]'));
let hintVisible = false;

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='fr')||(i===1&&l==='en')));
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.dataset.i18n;
    if(UI[l][key]) el.textContent=UI[l][key];
  });
  load();
}

function buildSidebar() {
  const ui = UI[lang];
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `<div class="sidebar-title">${ui.exercises} (${done.size}/${exercises.length})</div>`;
  exercises.forEach((ex,i)=>{
    const div=document.createElement('div');
    div.className='exercise-item'+(i===current?' active':'')+(done.has(ex.id)?' done':'');
    const name = lang==='en' ? ex.name_en : ex.name;
    const lvl = ui.levels[ex.level];
    div.innerHTML=`<div class="ex-icon">${done.has(ex.id)?'✓':ex.id}</div><div class="ex-info"><div class="ex-name">${name}</div><div class="ex-level"><span class="level-badge badge-${ex.level}">${lvl}</span></div></div>`;
    div.onclick=()=>{current=i;load();};
    sidebar.appendChild(div);
  });
}

function load() {
  const ex=exercises[current];
  const ui=UI[lang];
  const name=lang==='en'?ex.name_en:ex.name;
  const desc=lang==='en'?ex.description_en:ex.description;
  const hint=lang==='en'?ex.hint_en:ex.hint;
  document.getElementById('ex-title').textContent=`#${ex.id} — ${name}`;
  document.getElementById('ex-description').textContent=desc;
  document.getElementById('hint-box').textContent='💡 '+hint;
  document.getElementById('hint-box').style.display='none';
  document.getElementById('code-editor').value=ex.starter;
  document.getElementById('output').textContent=ui.waiting;
  document.getElementById('output').className='';
  document.getElementById('expected-display').textContent=ex.expected;
  document.getElementById('status-msg').className='status-msg';
  hintVisible=false;
  buildSidebar();
  document.getElementById('progress-fill').style.width=(done.size/exercises.length*100)+'%';
}

function runCode() {
  const code=document.getElementById('code-editor').value;
  const outputEl=document.getElementById('output');
  let out='';
  outputEl.className=''; outputEl.textContent='';
  Sk.configure({
    output:(t)=>{out+=t;outputEl.textContent=out;},
    read:(x)=>{if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined)throw"File not found: '"+x+"'";return Sk.builtinFiles["files"][x];}
  });
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>outputEl.className='success')
    .catch((err)=>{outputEl.className='error';outputEl.textContent='❌ '+err.toString();});
}

function checkCode() {
  const code=document.getElementById('code-editor').value;
  const outputEl=document.getElementById('output');
  const statusEl=document.getElementById('status-msg');
  const ui=UI[lang];
  let out='';
  Sk.configure({
    output:(t)=>{out+=t;},
    read:(x)=>{if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined)throw"File not found: '"+x+"'";return Sk.builtinFiles["files"][x];}
  });
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>",false,code,true))
    .then(()=>{
      const ex=exercises[current];
      if(ex.check(out)){
        statusEl.textContent=ui.ok; statusEl.className='status-msg ok';
        outputEl.className='success'; outputEl.textContent=out;
        done.add(ex.id); localStorage.setItem('py_done',JSON.stringify([...done]));
        buildSidebar(); document.getElementById('progress-fill').style.width=(done.size/exercises.length*100)+'%';
        if(current<exercises.length-1)setTimeout(()=>{current++;load();},1500);
      } else {
        statusEl.textContent=ui.fail; statusEl.className='status-msg fail';
        outputEl.className='error'; outputEl.textContent=out||'(no output)';
      }
    })
    .catch((err)=>{statusEl.textContent=ui.err;statusEl.className='status-msg fail';outputEl.className='error';outputEl.textContent='❌ '+err.toString();});
}

document.getElementById('btn-run').onclick=runCode;
document.getElementById('btn-check').onclick=checkCode;
document.getElementById('btn-hint').onclick=()=>{hintVisible=!hintVisible;document.getElementById('hint-box').style.display=hintVisible?'block':'none';};
document.getElementById('btn-reset').onclick=()=>{document.getElementById('code-editor').value=exercises[current].starter;document.getElementById('output').textContent=UI[lang].waiting;document.getElementById('output').className='';document.getElementById('status-msg').className='status-msg';};
document.getElementById('code-editor').addEventListener('keydown',(e)=>{if(e.key==='Tab'){e.preventDefault();const s=e.target,st=s.selectionStart;s.value=s.value.substring(0,st)+'    '+s.value.substring(s.selectionEnd);s.selectionStart=s.selectionEnd=st+4;}});

setLang(lang);
</script>
</body>
</html>
